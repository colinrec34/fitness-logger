# Reverse-proxy vhost for fitness-logger, behind the shared nginx front door.
# Routed by hostname so it coexists with the other apps.
#
# Install (needs sudo):
#   sudo cp ~/fitness-logger/deploy/nginx-fitness.conf /etc/nginx/sites-available/fitness
#   sudo ln -sf /etc/nginx/sites-available/fitness /etc/nginx/sites-enabled/fitness
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then point DNS for fitness.home at the server (router record or /etc/hosts).

server {
    listen 80;
    server_name fitness.home;

    # Health Auto Export posts workout payloads with GPS routes (tens of MB).
    location /api/health-export {
        client_max_body_size 250m;
        proxy_read_timeout 300s;
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
